<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第四章｜系統沒有發現她已經離開了</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html, body{
    height:100%;
    background:#ececec;
    font-family:"Noto Serif TC","Microsoft JhengHei",serif;
    color:#222;
    line-height:2;
}

/* 🔥 scroll 容器 */
body{
    height:100vh;
    overflow-y:scroll;
    scroll-snap-type: y mandatory;
    scroll-behavior: smooth;
}

/* 進度條 */
#progress-bar{
    position:fixed;
    top:0;
    left:0;
    height:4px;
    width:0%;
    background:#002FA7;
    z-index:9999;
}

/* 容器 */
.container{
    max-width:100%;
    margin:0;
    padding-bottom:0;
}

/* 每一頁 */
.page{
    width:100%;
    height:100vh;          /* ⭐關鍵：一頁等於一個螢幕 */
    margin:0;

    padding:60px 70px;

    display:flex;
    flex-direction:column;
    justify-content:center;

    scroll-snap-align:start;
    padding:60px 70px;
    box-shadow:0 0 20px rgba(0,0,0,0.15);
    border-radius:12px;

    scroll-snap-align: start;
    scroll-snap-stop: always;

    transition: transform .3s ease, box-shadow .3s;
}

.page:hover{
    transform:translateY(-5px);
}

/* 文字 */
.chapter-title{
    text-align:center;
    margin-top:80px;
    margin-bottom:60px;
}

.chapter-no{
    font-size:20px;
    letter-spacing:6px;
    color:#002FA7;
}

.chapter-text{
    font-size:30px;
    font-weight:bold;
    color:#002FA7;
}

.story{
    font-size:22px;
    max-width:580px;
    margin:auto;
}

p{
    font-size:20px;
    margin-bottom:18px;
    text-indent:2em;
}

.quote{
    text-align:center;
    color:#666;
    font-style:italic;
}

.page-number{
    text-align:center;
    color:#999;
    font-size:16px;
    margin-top:40px;
}

.spacer{
    height:100px;
}

.info-page{
    background:#f7f9fc;
}
</style>
</head>

<body>

<div id="progress-bar"></div>

<div class="container">

<!-- 封面 -->
<div class="page">
    <img src="封面.png" style="width:100%;">
</div>

<!-- 第1頁 -->
<div class="page">
    <div class="chapter-title">
        <div class="chapter-no">第四章</div>
        <div class="chapter-text">系統沒有發現她已經離開了</div>
    </div>

    <div class="story">
        <p>她離開的第 49 天。</p>
        <p>她的信箱收到一封通知。</p>
        <p class="quote">「我們很久沒有看到您登入了。」</p>
        <p>「請點擊以下連結確認帳戶狀態。」</p>
        <p>她當然不會點。</p>
        <div class="spacer"></div>
        <p>但系統不知道。</p>
    </div>

    <div class="page-number">— 1 —</div>
</div>

<!-- 第2頁 -->
<div class="page">
    <div class="story">
        <p>Spotify 還在推薦新歌。</p>
        <p>YouTube 還在推影片。</p>
        <p>購物網站還在提醒她。</p>
        <p>世界沒有停止。</p>
        <p>演算法也沒有。</p>
    </div>

    <div class="page-number">— 2 —</div>
</div>

<!-- 第3頁 -->
<div class="page">
    <div class="story">
        <p>某天，她媽媽滑到她的帳號。</p>
        <p>看到「為你推薦」。</p>
        <p>她突然哭了。</p>
    </div>

    <div class="page-number">— 3 —</div>
</div>

</div>

<script>
window.addEventListener("scroll", function () {
    const scrollTop = document.documentElement.scrollTop;
    const scrollHeight = document.documentElement.scrollHeight - window.innerHeight;
    const scrolled = (scrollTop / scrollHeight) * 100;

    document.getElementById("progress-bar").style.width = scrolled + "%";
});

/* 翻頁 */
document.addEventListener("keydown", function(e){
    if(e.key === "ArrowDown"){
        window.scrollBy({ top: window.innerHeight, behavior: "smooth" });
    }
    if(e.key === "ArrowUp"){
        window.scrollBy({ top: -window.innerHeight, behavior: "smooth" });
    }
});
</script>

</body>
</html>
